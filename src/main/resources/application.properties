server.port=9500
# Removed context path - APIs di /api, static di root

# Database Configuration - H2 (Development)
spring.datasource.url=jdbc:h2:mem:pmb_uhn;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Mail Configuration - SendGrid (More reliable for hosting)
# Option 1: SendGrid (RECOMMENDED for production)
spring.mail.host=${MAIL_HOST:smtp.sendgrid.net}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:apikey}
spring.mail.password=${MAIL_PASSWORD:SG.changeme}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# If using Gmail instead (fallback)
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=your-email@gmail.com  
# spring.mail.password=YOUR_APP_PASSWORD (16 chars from myaccount.google.com/apppasswords)

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=1MB
app.upload.dir=uploads/

# Server Timeout Configuration
server.tomcat.connection-timeout=120000
server.tomcat.threads.max=200
server.tomcat.accept-count=100
server.compression.enabled=true
server.compression.min-response-size=1024

# Request Timeout (miliseconds)
spring.mvc.async.request-timeout=120000

# JWT Configuration
jwt.secret=${JWT_SECRET:your-super-secret-key-change-this-in-production}
jwt.expiration=604800000

# BRIVA Configuration
briva.api.key=${BRIVA_API_KEY:your-api-key}
briva.api.secret=${BRIVA_API_SECRET:your-api-secret}
briva.api.url=https://apibriva.bri.co.id/v2
briva.client.id=${BRIVA_CLIENT_ID:your-client-id}

# Application Configuration
app.name=PMB HKBP Nommensen
app.version=1.0.0
app.timezone=Asia/Jakarta
app.frontend.url=http://localhost:9500

# ===== STATIC FILES & UPLOADS CONFIGURATION =====
# Serve static files from uploads directory
spring.web.resources.static-locations=classpath:/static/,file:./uploads/
spring.mvc.static-path-pattern=/uploads/**
spring.web.resources.static-locations=file:src/main/resources/static/

# Disable all caching untuk development
spring.web.resources.cache.period=0
spring.web.resources.cache.cachecontrol.max-age=0
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.no-store=true
spring.web.resources.cache.cachecontrol.must-revalidate=true
spring.web.resources.chain.cache=false

# Thymeleaf Configuration - Disable cache
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.prefix=file:src/main/resources/templates/
spring.thymeleaf.check-template-location=false

# ===== DEVELOPMENT TOOLS =====
# Enable spring-boot-devtools restart
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Gemini AI Configuration
gemini.api.key=AIzaSyBPJfG6jOVC08qD1ss-NrjMAysJ58JkOZc

# ===== DEBUG LOGGING CONFIGURATION =====
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestResponseBodyMethodProcessor=DEBUG
logging.level.com.uhn.pmb=DEBUG
