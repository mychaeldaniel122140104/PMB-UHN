<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Daftar Ulang</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        @media print {
            .no-print { display: none !important; }
            body { margin: 0; padding: 5px; }
            .container-fluid { box-shadow: none; padding: 5px; margin: 0; }
            .table { font-size: 13px !important; width: 100%; }
            .table thead { background: #e9ecef; }
            .table td, .table th { padding: 8px 6px !important; }
            h1 { font-size: 18px; margin-bottom: 5px; }
            .info-text { display: none; }
        }
        body { font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif; background: #f8f9fa; padding: 10px; }
        .container-fluid { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 4px rgba(0,0,0,.1); }
        .table { margin-top: 20px; width: 100%; table-layout: auto; }
        .table thead { background: #e9ecef; }
        .btn-group-actions { margin-bottom: 20px; }
        .loading { display: none; }
        h1 { color: #333; margin-bottom: 10px; font-weight: 600; }
        .info-text { color: #666; font-size: 14px; margin-bottom: 20px; }
        .table-responsive { width: 100%; overflow-x: auto; }
        .badge { font-size: 12px; }
        .doc-link { color: #0d6efd; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container-fluid px-3">
        <div class="d-flex justify-content-between align-items-center no-print">
            <div>
                <h1>Data Daftar Ulang</h1>
                <p class="info-text">Tabel lengkap semua data daftar ulang dengan dokumen pendukung</p>
            </div>
            <div class="btn-group-actions">
                <button class="btn btn-primary" onclick="downloadCSV()"><i class="bi">⬇</i> CSV</button>
                <button class="btn btn-secondary" onclick="downloadJSON()"><i class="bi">⬇</i> JSON</button>
                <button class="btn btn-info" onclick="window.print()"><i class="bi">🖨</i> Print (Ctrl+P)</button>
            </div>
        </div>

        <div class="loading">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p>Memuat data...</p>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover" id="dataTable">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Nama</th>
                        <th>NIK</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Catatan Validasi</th>
                        <th>Dokumen</th>
                        <th>Disubmit</th>
                        <th>Divalidasi</th>
                        <th>Dibuat</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>

        <div class="text-center mt-3 text-muted no-print">
            <small>Total: <strong id="totalRecords">0</strong> data daftar ulang</small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let tableData = [];

        async function loadData() {
            try {
                const authToken = localStorage.getItem('authToken') || window.authToken;
                const response = await fetch('/admin/api/table/reenrollments', {
                    headers: { 'Authorization': 'Bearer ' + authToken }
                });
                const result = await response.json();
                
                if (result.success) {
                    tableData = result.data;
                    populateTable();
                    document.getElementById('totalRecords').textContent = result.totalRecords;
                    console.log('✅ Data loaded:', result.totalRecords, 'records');
                } else {
                    alert('Error: ' + result.message);
                }
            } catch (error) {
                console.error('❌ Error loading data:', error);
                alert('Gagal memuat data: ' + error.message);
            }
        }

        function populateTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            tableData.forEach((row, index) => {
                const statusBadge = getStatusBadge(row.status);
                const docHTML = row.documents && row.documents.length > 0 
                    ? row.documents.map(d => `<a href="${d.path}" target="_blank" class="doc-link">${d.type}</a>`).join(', ')
                    : '-';
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${row.studentName}</td>
                    <td>${row.nik}</td>
                    <td>${row.email}</td>
                    <td>${statusBadge}</td>
                    <td>${row.validationNotes || '-'}</td>
                    <td>${docHTML}</td>
                    <td>${row.submittedAt ? new Date(row.submittedAt).toLocaleDateString('id-ID') : '-'}</td>
                    <td>${row.validatedAt ? new Date(row.validatedAt).toLocaleDateString('id-ID') : '-'}</td>
                    <td>${new Date(row.createdAt).toLocaleDateString('id-ID')}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function getStatusBadge(status) {
            const statusMap = {
                'INCOMPLETE': '<span class="badge bg-warning">Belum Lengkap</span>',
                'SUBMITTED': '<span class="badge bg-info">Submitted</span>',
                'APPROVED': '<span class="badge bg-success">Disetujui</span>',
                'REJECTED': '<span class="badge bg-danger">Ditolak</span>'
            };
            return statusMap[status] || `<span class="badge bg-secondary">${status}</span>`;
        }

        function downloadCSV() {
            const headers = ['No', 'Nama', 'NIK', 'Email', 'Status', 'Catatan Validasi', 'Dokumen', 'Disubmit', 'Divalidasi', 'Dibuat'];
            
            let csv = headers.join(',') + '\n';
            tableData.forEach((row, index) => {
                const docList = row.documents && row.documents.length > 0 
                    ? row.documents.map(d => d.type).join(';')
                    : '-';
                
                const values = [
                    index + 1,
                    `"${row.studentName}"`,
                    row.nik,
                    row.email,
                    row.status,
                    `"${row.validationNotes || ''}"`,
                    `"${docList}"`,
                    row.submittedAt ? new Date(row.submittedAt).toLocaleDateString('id-ID') : '-',
                    row.validatedAt ? new Date(row.validatedAt).toLocaleDateString('id-ID') : '-',
                    new Date(row.createdAt).toLocaleDateString('id-ID')
                ];
                csv += values.join(',') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', `daftar-ulang-${new Date().getTime()}.csv`);
            link.click();
        }

        function downloadJSON() {
            const dataToDownload = {
                title: 'Data Daftar Ulang',
                totalRecords: tableData.length,
                exportDate: new Date().toISOString(),
                data: tableData
            };

            const blob = new Blob([JSON.stringify(dataToDownload, null, 2)], { type: 'application/json' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', `daftar-ulang-${new Date().getTime()}.json`);
            link.click();
        }

        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
                e.preventDefault();
                window.print();
            }
        });

        window.addEventListener('load', loadData);
    </script>
</body>
</html>
