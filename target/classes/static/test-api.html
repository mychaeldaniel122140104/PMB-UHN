<!DOCTYPE html>
<html>
<head>
    <title>Test Login & Token Validation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; padding: 20px; }
        .card { max-width: 600px; margin: 20px auto; }
        pre { background: #f8f9fa; padding: 15px; max-height: 400px; overflow-y: auto; }
        .success { color: #28a745; font-weight: bold; }
        .error { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h4>🔐 Test Login & Form Access</h4>
        </div>
        <div class="card-body">
            <h5>1. Login dengan Test Account</h5>
            <div class="mb-3">
                <label>Email: <code>student@test.com</code></label>
            </div>
            <div class="mb-3">
                <label>Password: <code>student123</code></label>
            </div>
            <button class="btn btn-primary mb-3" onclick="testLogin()">🔓 Login</button>
            
            <h5 class="mt-4">2. Test Form Access</h5>
            <button class="btn btn-success mb-3" onclick="testFormAccess()">📋 GET /api/camaba/admission-form</button>
            
            <h5 class="mt-4">Result:</h5>
            <pre id="result">--- Hasil akan muncul di sini ---</pre>
        </div>
    </div>

    <script>
        async function testLogin() {
            const result = document.getElementById('result');
            result.textContent = '⏳ Logging in...';
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'student@test.com',
                        password: 'student123'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.token) {
                    localStorage.setItem('authToken', data.token);
                    result.innerHTML = `<span class="success">✅ Login Berhasil!</span>

Token di-simpan: ${data.token.substring(0, 50)}...

Response:
${JSON.stringify(data, null, 2)}`;
                } else {
                    result.innerHTML = `<span class="error">❌ Login Gagal (${response.status})</span>

${JSON.stringify(data, null, 2)}`;
                }
            } catch (error) {
                result.innerHTML = `<span class="error">❌ Error: ${error.message}</span>`;
            }
        }
        
        async function testFormAccess() {
            const result = document.getElementById('result');
            const token = localStorage.getItem('authToken');
            
            if (!token) {
                result.innerHTML = '<span class="error">❌ No token found. Login first!</span>';
                return;
            }
            
            result.textContent = '⏳ Mengakses form endpoint...';
            
            try {
                const response = await fetch('/api/camaba/admission-form', {
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    result.innerHTML = `<span class="success">✅ Form Access Berhasil (${response.status})</span>

${JSON.stringify(data, null, 2)}`;
                } else {
                    result.innerHTML = `<span class="error">❌ Form Access Gagal (${response.status})</span>

${JSON.stringify(data, null, 2)}

Token yang dikirim: ${token.substring(0, 50)}...`;
                }
            } catch (error) {
                result.innerHTML = `<span class="error">❌ Error: ${error.message}</span>`;
            }
        }
    </script>
</body>
</html>
